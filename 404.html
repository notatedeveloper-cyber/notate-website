:root {
  --bg: #ffffff;
  --bg-soft: #fafafa;
  --tile: #f7f7f8;
  --ink: #0b0b0f;

  --muted: #6e6e76;

  --brand-2: #5A3CFF;
  --brand-tint: #efeaff;
  --radius-pill: 999px;
  --radius-sm: 12px;
  --shadow-lift: 0 1px 2px rgba(15,15,25,0.04), 0 30px 60px -28px rgba(58,30,253,0.22);
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.012em;
  line-height: 1.5;
}
::selection { background: var(--brand); color: #fff; }

/* ---- Layout ---- */
.wrap { max-width: 1160px; margin: 0 auto; padding: 0 28px; }

/* ---- Nav ---- */
.nav {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  background: rgba(255,255,255,0.72);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.brand {
  display: inline-flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--ink); font-weight: 600; letter-spacing: -0.02em;
}
.brand-mark { width: 24px; height: 24px; border-radius: 6px; display: inline-block; overflow: hidden; }
.brand-mark svg { display: block; width: 100%; height: 100%; }
.brand-wordmark { font-size: 17px; }
.nav-links {
  display: flex; align-items: center; gap: 28px;
}
.nav-links a {
  color: var(--muted); text-decoration: none; font-size: 13.5px; font-weight: 500;
  transition: color .15s ease;
}
.nav-links a:hover { color: var(--ink); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: #fff;
  padding: 8px 14px 8px 12px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 500; text-decoration: none;
  transition: transform .2s ease, background .2s ease;
}
.nav-cta:hover { background: var(--brand); transform: translateY(-1px); }
.nav-cta .chip-free {
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
  padding: 2px 6px; border-radius: var(--radius-pill);
  text-transform: uppercase;
}
@media (max-width: 720px) {
  .nav-links { display: none; }
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  border: 0; cursor: pointer; text-decoration: none;
  font-family: inherit; font-weight: 500;
  transition: transform .2s ease, background .2s ease, box-shadow .2s ease, color .2s ease;
}
.btn-primary {
  background: var(--ink); color: #fff;
  padding: 14px 22px 14px 18px;
  border-radius: var(--radius-pill);
  font-size: 15px;
  box-shadow: var(--shadow-lift);
}
.btn-primary:hover {
  background: var(--brand);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent; color: var(--ink);
  padding: 14px 18px;
  border-radius: var(--radius-pill);
  font-size: 15px;
  border: 1px solid var(--line-2);
}
.btn-ghost:hover {
  background: var(--bg-soft);
  border-color: var(--line-2);
}

/* ---- 404 section ---- */
.notfound-section {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 56px - 140px);
  padding: 80px 0 100px;
}
.notfound-content { text-align: center; max-width: 480px; margin: 0 auto; }
.notfound-code {
  font-family: var(--font-mono);
  font-size: 96px;
  font-weight: 700;
  line-height: 1;
  margin: 0 0 24px;
  letter-spacing: -0.04em;
  user-select: none;
  -webkit-user-select: none;
  background: linear-gradient(135deg, var(--muted-2) 0%, var(--line-2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.notfound-content h1 {
  margin: 0 0 14px;
  font-size: clamp(28px, 5vw, 42px);
  line-height: 1.06;
  letter-spacing: -0.03em;
  font-weight: 600;
}
.notfound-content p {
  color: var(--muted); font-size: 16.5px; line-height: 1.55; margin: 0 0 36px;
  letter-spacing: -0.005em;
}
.notfound-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

/* ---- Footer ---- */
footer {
  padding: 56px 0 72px;
  border-top: 1px solid var(--line);
  color: var(--muted-2);
  font-size: 12.5px;
}
.foot-base {
  display: flex; justify-content: space-between; gap: 16px;
  font-family: var(--font-mono); font-size: 12px; color: var(--muted-2);
  flex-wrap: wrap;
}

@media (max-width: 720px) {
  .wrap { padding: 0 20px; }
  .notfound-section { padding: 56px 0 72px; }
  .notfound-code { font-size: 72px; }
  footer { padding: 40px 0 48px; }
}
</style>
